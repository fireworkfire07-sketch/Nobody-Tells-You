name: Video Uret ve Yukle
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kurulum
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
      - name: Video uret
        run: python pipeline.py
        env:
          NTY_CLIENT_ID: ${{ secrets.NTY_CLIENT_ID }}
          NTY_CLIENT_SECRET: ${{ secrets.NTY_CLIENT_SECRET }}
          NTY_REFRESH_TOKEN: ${{ secrets.NTY_REFRESH_TOKEN }}
