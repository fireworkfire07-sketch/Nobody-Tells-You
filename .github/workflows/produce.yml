name: Video Uret ve Yukle
on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Video topic"
        required: false
        default: ""
      upload_to_youtube:
        description: "Upload final video to YouTube"
        required: true
        type: boolean
        default: false
  repository_dispatch:
    types: [new_topic]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kurulum
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
      - name: Senaryo uret
        run: python nty_engine.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
          VIDEO_TOPIC: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.topic || inputs.topic }}
      - name: Uretilen senaryo ve meta bilgisini artifact olarak yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nty-script-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            script.txt
            meta.txt
            projects/
      - name: Resolve upload setting
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=${{ inputs.upload_to_youtube }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Video uret (yuklemeden)
        if: ${{ steps.resolve.outputs.upload != 'true' }}
        run: python pipeline.py
        env:
          SKIP_YOUTUBE_UPLOAD: "true"
      - name: Video uret ve yukle
        if: ${{ steps.resolve.outputs.upload == 'true' }}
        run: python pipeline.py
        env:
          NTY_CLIENT_ID: ${{ secrets.NTY_YT_CLIENT_ID }}
          NTY_CLIENT_SECRET: ${{ secrets.NTY_YT_CLIENT_SECRET }}
          NTY_REFRESH_TOKEN: ${{ secrets.NTY_YT_REFRESH_TOKEN }}
